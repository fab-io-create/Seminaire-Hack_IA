# model: choose a small baseline first; upgrade once it works.
model: yolo11n.pt   
data: configs/data.yaml

# core
imgsz: 640
epochs: 30
batch: 16
patience: 20
fraction: 1.0
workers: 0

# optimization
lr0: 0.001
lrf: 0.01
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 7
optimizer: AdamW

# augmentation (YOLO's built-ins)
hsv_h: 0
hsv_s: 0.7
hsv_v: 0.4
degrees: 15.0
translate: 0.1
scale: 0.5
shear: 0.0
flipud: 0.5
fliplr: 0.5
mosaic: 1.0
mixup: 0.1

# logging / saving
project: experiments
name: yolo26_fire_detection
exist_ok: false

# evaluation
val: true
save: true
